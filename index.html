<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>陀螺仪 & 加速度计</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 16px;
    color: #7eb8ff;
    text-align: center;
  }
  #startBtn {
    background: linear-gradient(135deg, #4a90d9, #357abd);
    color: white;
    border: none;
    padding: 14px 36px;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(74, 144, 217, 0.4);
    transition: transform 0.15s;
  }
  #startBtn:active { transform: scale(0.96); }
  #startBtn.hidden { display: none; }

  .section {
    width: 100%;
    max-width: 400px;
    background: #12122a;
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
    border: 1px solid #1e1e40;
  }
  .section-title {
    font-size: 0.85rem;
    color: #8888aa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .row:last-child { margin-bottom: 0; }
  .label {
    font-size: 1rem;
    font-weight: 600;
    min-width: 30px;
  }
  .label.x { color: #ff6b6b; }
  .label.y { color: #51cf66; }
  .label.z { color: #339af0; }

  .bar-container {
    flex: 1;
    height: 22px;
    background: #1a1a35;
    border-radius: 11px;
    margin: 0 12px;
    overflow: hidden;
    position: relative;
  }
  .bar-center {
    position: absolute;
    left: 50%;
    top: 0;
    width: 1px;
    height: 100%;
    background: #333355;
  }
  .bar {
    position: absolute;
    top: 2px;
    height: 18px;
    border-radius: 9px;
    transition: left 0.08s, width 0.08s;
  }
  .bar.x { background: rgba(255, 107, 107, 0.7); }
  .bar.y { background: rgba(81, 207, 102, 0.7); }
  .bar.z { background: rgba(51, 154, 240, 0.7); }

  .value {
    font-size: 0.95rem;
    font-variant-numeric: tabular-nums;
    min-width: 75px;
    text-align: right;
  }

  /* 3D visualization */
  .cube-container {
    width: 100%;
    max-width: 400px;
    height: 220px;
    perspective: 600px;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 16px;
  }
  .cube {
    width: 100px;
    height: 100px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out;
  }
  .face {
    position: absolute;
    width: 100px;
    height: 100px;
    border: 2px solid rgba(255,255,255,0.15);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 0.75rem;
    font-weight: 700;
    border-radius: 8px;
  }
  .front  { background: rgba(74,144,217,0.4); transform: translateZ(50px); }
  .back   { background: rgba(74,144,217,0.2); transform: rotateY(180deg) translateZ(50px); }
  .right  { background: rgba(255,107,107,0.3); transform: rotateY(90deg) translateZ(50px); }
  .left   { background: rgba(255,107,107,0.2); transform: rotateY(-90deg) translateZ(50px); }
  .top    { background: rgba(81,207,102,0.3); transform: rotateX(90deg) translateZ(50px); }
  .bottom { background: rgba(81,207,102,0.2); transform: rotateX(-90deg) translateZ(50px); }

  #status {
    font-size: 0.85rem;
    color: #666;
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>

<h1>📱 陀螺仪 & 加速度计</h1>

<button id="startBtn" onclick="requestPermission()">点击开启传感器</button>

<div class="cube-container">
  <div class="cube" id="cube">
    <div class="face front">前</div>
    <div class="face back">后</div>
    <div class="face right">右</div>
    <div class="face left">左</div>
    <div class="face top">上</div>
    <div class="face bottom">下</div>
  </div>
</div>

<!-- 加速度 (含重力) -->
<div class="section">
  <div class="section-title">加速度（含重力）m/s²</div>
  <div class="row">
    <span class="label x">X</span>
    <div class="bar-container"><div class="bar-center"></div><div class="bar x" id="agxBar"></div></div>
    <span class="value" id="agx">0.00</span>
  </div>
  <div class="row">
    <span class="label y">Y</span>
    <div class="bar-container"><div class="bar-center"></div><div class="bar y" id="agyBar"></div></div>
    <span class="value" id="agy">0.00</span>
  </div>
  <div class="row">
    <span class="label z">Z</span>
    <div class="bar-container"><div class="bar-center"></div><div class="bar z" id="agzBar"></div></div>
    <span class="value" id="agz">0.00</span>
  </div>
</div>

<!-- 用户加速度 (不含重力) -->
<div class="section">
  <div class="section-title">用户加速度（不含重力）m/s²</div>
  <div class="row">
    <span class="label x">X</span>
    <div class="bar-container"><div class="bar-center"></div><div class="bar x" id="axBar"></div></div>
    <span class="value" id="ax">0.00</span>
  </div>
  <div class="row">
    <span class="label y">Y</span>
    <div class="bar-container"><div class="bar-center"></div><div class="bar y" id="ayBar"></div></div>
    <span class="value" id="ay">0.00</span>
  </div>
  <div class="row">
    <span class="label z">Z</span>
    <div class="bar-container"><div class="bar-center"></div><div class="bar z" id="azBar"></div></div>
    <span class="value" id="az">0.00</span>
  </div>
</div>

<!-- 陀螺仪旋转速率 -->
<div class="section">
  <div class="section-title">陀螺仪旋转速率 °/s</div>
  <div class="row">
    <span class="label x">α</span>
    <div class="bar-container"><div class="bar-center"></div><div class="bar x" id="raBar"></div></div>
    <span class="value" id="ra">0.00</span>
  </div>
  <div class="row">
    <span class="label y">β</span>
    <div class="bar-container"><div class="bar-center"></div><div class="bar y" id="rbBar"></div></div>
    <span class="value" id="rb">0.00</span>
  </div>
  <div class="row">
    <span class="label z">γ</span>
    <div class="bar-container"><div class="bar-center"></div><div class="bar z" id="rcBar"></div></div>
    <span class="value" id="rc">0.00</span>
  </div>
</div>

<!-- 设备方向 -->
<div class="section">
  <div class="section-title">设备方向 °</div>
  <div class="row">
    <span class="label x">α</span>
    <div class="bar-container"><div class="bar-center"></div><div class="bar x" id="oaBar"></div></div>
    <span class="value" id="oa">0.00</span>
  </div>
  <div class="row">
    <span class="label y">β</span>
    <div class="bar-container"><div class="bar-center"></div><div class="bar y" id="obBar"></div></div>
    <span class="value" id="ob">0.00</span>
  </div>
  <div class="row">
    <span class="label z">γ</span>
    <div class="bar-container"><div class="bar-center"></div><div class="bar z" id="ocBar"></div></div>
    <span class="value" id="oc">0.00</span>
  </div>
</div>

<div id="status">等待启动传感器...</div>

<script>
function updateBar(barId, value, maxVal) {
  const bar = document.getElementById(barId);
  const pct = Math.min(Math.abs(value) / maxVal, 1);
  const width = pct * 50;
  if (value >= 0) {
    bar.style.left = '50%';
    bar.style.width = width + '%';
  } else {
    bar.style.left = (50 - width) + '%';
    bar.style.width = width + '%';
  }
}

function fmt(v) {
  if (v == null) return '--';
  return v.toFixed(2);
}

function handleMotion(e) {
  const ag = e.accelerationIncludingGravity || {};
  document.getElementById('agx').textContent = fmt(ag.x);
  document.getElementById('agy').textContent = fmt(ag.y);
  document.getElementById('agz').textContent = fmt(ag.z);
  updateBar('agxBar', ag.x || 0, 20);
  updateBar('agyBar', ag.y || 0, 20);
  updateBar('agzBar', ag.z || 0, 20);

  const a = e.acceleration || {};
  document.getElementById('ax').textContent = fmt(a.x);
  document.getElementById('ay').textContent = fmt(a.y);
  document.getElementById('az').textContent = fmt(a.z);
  updateBar('axBar', a.x || 0, 10);
  updateBar('ayBar', a.y || 0, 10);
  updateBar('azBar', a.z || 0, 10);

  const rr = e.rotationRate || {};
  document.getElementById('ra').textContent = fmt(rr.alpha);
  document.getElementById('rb').textContent = fmt(rr.beta);
  document.getElementById('rc').textContent = fmt(rr.gamma);
  updateBar('raBar', rr.alpha || 0, 360);
  updateBar('rbBar', rr.beta || 0, 360);
  updateBar('rcBar', rr.gamma || 0, 360);
}

function handleOrientation(e) {
  const alpha = e.alpha || 0;
  const beta = e.beta || 0;
  const gamma = e.gamma || 0;

  document.getElementById('oa').textContent = fmt(alpha);
  document.getElementById('ob').textContent = fmt(beta);
  document.getElementById('oc').textContent = fmt(gamma);
  updateBar('oaBar', alpha - 180, 180);
  updateBar('obBar', beta, 180);
  updateBar('ocBar', gamma, 90);

  const cube = document.getElementById('cube');
  cube.style.transform = `rotateX(${beta}deg) rotateY(${gamma}deg) rotateZ(${-alpha}deg)`;
}

function startListeners() {
  window.addEventListener('devicemotion', handleMotion, true);
  window.addEventListener('deviceorientation', handleOrientation, true);
  document.getElementById('status').textContent = '✅ 传感器已激活 — 移动手机查看数据';
  document.getElementById('startBtn').classList.add('hidden');
}

function requestPermission() {
  // iOS 13+ requires explicit permission
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(state => {
        if (state === 'granted') {
          DeviceOrientationEvent.requestPermission().then(s => {
            if (s === 'granted') startListeners();
          });
        } else {
          document.getElementById('status').textContent = '❌ 传感器权限被拒绝';
        }
      })
      .catch(err => {
        document.getElementById('status').textContent = '❌ 请求权限失败: ' + err.message;
      });
  } else {
    // Android / 桌面浏览器直接监听
    startListeners();
  }
}
</script>
</body>
</html>
